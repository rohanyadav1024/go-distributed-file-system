name: dfs

services:
  metad:
    build:
      context: ..
      dockerfile: Dockerfile.metad
    environment:
      DFS_REPLICATION_FACTOR: ${DFS_REPLICATION_FACTOR:-3}
      DFS_METADATA_DB_PATH: /var/lib/dfs/metad.db
      DFS_METRICS_ADDR: :9090
      DFS_JWT_SECRET: ${DFS_JWT_SECRET:-change-me}
    ports:
      - "50051:50051"
      - "9090:9090"
    volumes:
      - metad_db:/var/lib/dfs
      - ../certs/ca:/ca:ro
    networks:
      - dfs-net
    restart: unless-stopped

  storaged:
    build:
      context: ..
      dockerfile: Dockerfile.storaged
    depends_on:
      - metad
    environment:
      DFS_STORAGE_DATA_PATH: /var/lib/dfs/storage
      DFS_STORAGE_CAPACITY_BYTES: ${DFS_STORAGE_CAPACITY_BYTES:-10737418240}
      DFS_STORAGE_METRICS_ADDR: :9091
      DFS_METADATA_ADDR: metad:50051
    expose:
      - "50052"
      - "9091"
    volumes:
      - /var/lib/dfs/storage
      - ../certs/ca:/ca:ro
    networks:
      - dfs-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - dfs-net
    depends_on:
      - metad
      - storaged
    restart: unless-stopped

networks:
  dfs-net:
    driver: bridge

volumes:
  metad_db:
